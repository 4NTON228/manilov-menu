function Highlighted({ text, query }) {
  if (!query || !text) return <>{text}</>;
  const norm = (s) => s.toLowerCase().replace(/ё/g,"е").replace(/й/g,"и").replace(/[ъь]/g,"");
  const idx = norm(text).indexOf(norm(query));
  if (idx === -1) return <>{text}</>;
  return <>{text.slice(0,idx)}<mark className="hl">{text.slice(idx,idx+query.length)}</mark>{text.slice(idx+query.length)}</>;
}


function ManilovMenu() {

  };

  // ── УМНЫЙ ПОИСК ──────────────────────────────────────────────

  const [showDropdown, setShowDropdown] = useState(false);
  const [dropPos, setDropPos] = useState({ top: 0, left: 0, width: 0 });
  const sfieldRef = useRef(null);

  const updateDropPos = () => {
    if (sfieldRef.current) {
      const r = sfieldRef.current.getBoundingClientRect();
      setDropPos({ top: r.bottom + window.scrollY + 5, left: r.left + window.scrollX, width: r.width });
    }
  };
  const [suggestions, setSuggestions] = useState([]);      // подсказки
  const inputRef = useRef(null);

  // Нормализация русского текста
  const norm = s => s.toLowerCase()
    .replace(/ё/g,"е").replace(/й/g,"и").replace(/[ъь]/g,"");

  // Расстояние Левенштейна — для нечёткого матча
  const levenshtein = (a, b) => {
    if (!a.length) return b.length;
    if (!b.length) return a.length;
    const dp = Array.from({length: b.length+1}, (_,i) => i);
    for (let i = 1; i <= a.length; i++) {
      let prev = i;
      for (let j = 1; j <= b.length; j++) {
        const curr = a[i-1] === b[j-1] ? dp[j-1] : 1 + Math.min(dp[j-1], dp[j], prev);
        dp[j-1] = prev; prev = curr;
      }
      dp[b.length] = prev;
    }
    return dp[b.length];
  };

  // Нечёткое совпадение слова в тексте
  const fuzzyWord = (haystack, word) => {
    const h = norm(haystack);
    const w = norm(word);
    if (h.includes(w)) return true;                        // точное вхождение
    // Проверяем каждое слово в haystack на близость
    const tokens = h.split(/\s+/);
    for (const t of tokens) {
      if (t.length < 3) continue;
      const maxDist = w.length <= 4 ? 1 : w.length <= 7 ? 2 : 3;
      if (levenshtein(w, t.slice(0, w.length + 2)) <= maxDist) return true;
    }
    return false;
  };

  const SYNONYMS = {
    "напитки":  ["напитки","кофе","чаи","чай","сок","лимонад","коктеил","морс","квас","сбитен","взвар","шоколад","глинтвеин"],
    "закуска":  ["закуски","закусон","холодные","кушана","горяч"],
    "салат":    ["салат","оливе","селд","баклажан","барин"],
    "суп":      ["суп","солянк","борщ","щи","уха","похлебк","крем"],
    "горячее":  ["горяч","жарк","котлет","пельмен","беф","голубц","кролик"],
    "мясо":     ["говядин","свинин","куриц","котлет","пельмен","беф","голубц","кролик"],
    "рыба":     ["судак","горбуш","рыб","щука","уха","чир"],
    "десерт":   ["десерт","торт","шарлотк","коврижк","прага","наполеон","медовик","эклер","мороженое"],
    "чай":      ["чаи","чай","нечаиные","иван","ассам","эрл","кавказск","сенча","улун","малиновы","облепихов","яблочны","сибирск","таежны"],
    "кофе":     ["кофе","эспрессо","капучино","латте","гляссе","американо"],
    "завтрак":  ["утренние","яичниц","яицо","каша","блины","сырники","вареники"],
    "гарнир":   ["гарнир","гречка","пюре","рис","капуст"],
    "сок":      ["сок","апельсин","греипфрут","морковны","яблочны"],
    "лимонад":  ["лимонад","цитрусов","клубничны","мятно","облепихов"],
    "коктейл":  ["коктеил","ванильны","клубничны","шоколадны"],
    "банкет":   ["банкет","щука","утка","курник","пирог","крокенбуш"],
    "хлеб":     ["хлеб","ржаной","пшеничны","мясно"],
    "дешевый":  ["90","160","190","240","260","280","290","310","320"],
  };

  // Основная функция матча: точный + синонимы + нечёткий
  const matchesQuery = (haystack, query) => {
    const h = norm(haystack);
    const words = norm(query).trim().split(/\s+/).filter(Boolean);
    // Точное вхождение каждого слова
    if (words.every(w => h.includes(w))) return true;
    // Синонимы
    const n = norm(query).trim();
    for (const [key, exp] of Object.entries(SYNONYMS)) {
      if (n.includes(key) || key.includes(n)) return exp.some(s => h.includes(s));
    }
    // Нечёткий поиск для коротких запросов (одно слово, >3 символов)
    if (words.length === 1 && words[0].length > 3) {
      return fuzzyWord(haystack, words[0]);
    }
    return false;
  };

  // Подсчёт релевантности: точное вхождение > нечёткое > синоним
  const scoreItem = (item, catTitle, query) => {
    const text = norm(`${item.name} ${item.desc} ${catTitle}`);
    const q = norm(query).trim();
    if (text.includes(q)) return 3;
    if (matchesQuery(`${item.name} ${catTitle}`, query)) return 2;
    if (matchesQuery(item.desc, query)) return 1;
    return 0;
  };

  // Результаты поиска с сортировкой по релевантности
  const searchResults = search.trim()
    ? (() => {
        const groups = menuData.flatMap(cat => {
          const catMatch = matchesQuery(cat.title, search);
          const matched = cat.items
            .map(it => ({ ...it, _score: catMatch ? 3 : scoreItem(it, cat.title, search) }))
            .filter(it => it._score > 0 || catMatch);
          const filtered = matched;
          if (filtered.length === 0) return [];
          // Сортируем по релевантности внутри группы
          filtered.sort((a,b) => b._score - a._score);
          return [{ catTitle: cat.title, items: filtered }];
        });
        return groups;
      })()
    : null;

  const totalFound = searchResults ? searchResults.reduce((a,g) => a + g.items.length, 0) : 0;

  // Подсказки — топ-6 совпадающих названий блюд
  const computeSuggestions = (q) => {
    if (!q || q.length < 2) return [];
    const all = menuData.flatMap(cat =>
      cat.items
        .filter(it => matchesQuery(`${it.name} ${cat.title}`, q))
        .map(it => ({ label: it.name, price: it.price, cat: cat.title }))
    );
    return all.slice(0, 6);
  };

  // Обновляем подсказки при наборе (debounce 120ms)
  useEffect(() => {
    const t = setTimeout(() => setSuggestions(computeSuggestions(search)), 120);
    return () => clearTimeout(t);
  }, [search]);

  // Обновляем позицию дропдауна при ресайзе
  useEffect(() => {
    const handler = () => { if (showDropdown) updateDropPos(); };
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, [showDropdown]);


  const handleSearchSubmit = (q) => {
    setSuggestions([]);
    setShowDropdown(false);
  };

  const handleInputChange = (e) => {
    setSearch(e.target.value);
    setShowDropdown(true);
  };

  const handleSuggestionClick = (label) => {
    setSearch(label);
    setShowDropdown(false);
    inputRef.current?.blur();
  };

  const handleClear = () => {
    setSearch("");
    setSuggestions([]);
    setShowDropdown(false);
    inputRef.current?.focus();
  };

  const sections = activeCat ? menuData.filter(c => c.id === activeCat) : menuData;
  const toggleSec = id => { setOpenSec(p => p === id ? null : id); setOpenItem(null); };
  const toggleItem = key => setOpenItem(p => p === key ? null : key);
  const q = quotes[qIdx];

  return <>
    <style>{CSS}</style>

        <div className={`hero${heroOut ? " hero-out" : ""}`}>

          <div className="hero-content">
            <div className="hero-tag">Тверь · кафе с традициями</div>

                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>
        </div>
      )}

        <div
          className="sfield"
          ref={sfieldRef}
          onBlur={e => { if (!e.currentTarget.contains(e.relatedTarget)) setShowDropdown(false); }}
        >
          <svg className="sicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            ref={inputRef}
            className="sinput"
            placeholder="Поиск: борщ, кофе, десерт…"
            value={search}
            onChange={handleInputChange}
            onFocus={() => { updateDropPos(); setShowDropdown(true); }}
            onKeyDown={e => { if (e.key === 'Escape') handleClear(); if (e.key === 'Enter') { setSuggestions([]); setShowDropdown(false); inputRef.current?.blur(); } }}
            autoComplete="off"
          />
          {search && (
            <button className="sclear" onClick={handleClear}>✕</button>
          )}
        </div>
        {!search && (
          <div className="shint">Умный поиск — находит с опечатками, по категориям и ингредиентам</div>
        )}
      </div>

      {/* DROPDOWN — через портал поверх всего */}
      {showDropdown && suggestions.length > 0 &&
        ReactDOM.createPortal(
          <div className="sdropdown" style={{ top: dropPos.top, left: dropPos.left, width: dropPos.width }}>

                    <div className="rcat-head">{group.catTitle}</div>
                    <div className="cards-grid">
                      {group.items.map((item, ii) => {
                        const key = `sr-${gi}-${ii}`;
                        return <DishCard key={key} item={item} isOpen={openItem === key} onToggle={() => item.desc && toggleItem(key)} />;
                      })}
                    </div>
                  </div>
                ))
            }
          </>
        ) : (
          sections.map((cat, ci) => {
            const isOpen = openSec === cat.id || activeCat === cat.id;
            return (
              <div key={cat.id} className="sec" style={{ animationDelay: `${0.1 + ci * 0.045}s` }}>
                <div className="sec-head" onClick={() => toggleSec(cat.id)}>
                  <span className="sec-title">{cat.title}</span>
                  <div className="sec-right">
                    <span className="sec-count">{cat.items.length} позиций</span>
                    <svg className={`chevron${isOpen ? " open" : ""}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="6 9 12 15 18 9"/>
                    </svg>
                  </div>
                </div>
                <div className={`itemlist${isOpen ? " open" : ""}`}>
                  <div className="cards-grid">
                    {cat.items.map((item, ii) => {
                      const key = `${cat.id}-${ii}`;
                      return <DishCard key={key} item={item} isOpen={openItem === key} onToggle={() => item.desc && toggleItem(key)} />;
                    })}
                  </div>
                </div>
              </div>
            );
          })
        )}
      </div>


      {/* ПОДВАЛ */}
      <div className="footer">
        <div className="footer-rule" />
        <div className="fnote">Банкеты и фуршеты по предварительному заказу</div>
        <div className="fsite">MANILOVKAFE.RU</div>
      </div>

    </div>
  </>;
}
