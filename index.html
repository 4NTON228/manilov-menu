        function Highlighted({ text, query }) {
          if (!query || !text) return <>{text}</>;
          const norm = (s) => s.toLowerCase().replace(/ё/g, "е").replace(/й/g, "и").replace(/[ъь]/g, "");
          const nq = norm(query);
          const nt = norm(text);
          const idx = nt.indexOf(nq);
          if (idx === -1) return <>{text}</>;
          return (
            <>
              {text.slice(0, idx)}
              <mark className="hl">{text.slice(idx, idx + query.length)}</mark>
              {text.slice(idx + query.length)}
            </>
          );
        }

          const expandQuery = (query) => {

          const matchesQuery = (haystack, query) => {
            const h = norm(haystack);
            const words = norm(query).trim().split(/\s+/).filter(Boolean);

            const expanded = expandQuery(query);

            return false;
          };

            ? menuData.flatMap((cat) => {

          const sections = activeCat ? menuData.filter((c) => c.id === activeCat) : menuData;

                    <div className="hero-tag">Тверь · кафе с традициями</div>
                    <div className="hero-logo">Манилов</div>
                    <div className="hero-rule"><span className="hero-dot" /></div>
                    <div className="hero-label">Меню кафе</div>
                    <div className="hero-quote">«{q.text}»</div>
                    <div className="hero-author">— {q.author}</div>
                    <button className="hero-btn" onClick={scrollToMenu}>
                      Смотреть меню
                    </button>
                    <div className="hero-arrow" onClick={scrollToMenu}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="6 9 12 15 18 9"/>
                      </svg>
                    </div>
                  </div>
                </div>
                )}

                {/* ПОИСК */}
                <div className="search-wrap" ref={menuRef}>
                  <div className="sfield">
                    <svg className="sicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input
                      className="sinput"
                      placeholder="Поиск: кофе, напитки, борщ, десерт…"
                      value={search}
                      onChange={(e) => setSearch(e.target.value)}
                    />
                    {search && <button className="sclear" onClick={() => setSearch("")}>✕</button>}
                  </div>
                  {!search && <div className="shint">Ищет по блюдам, описаниям и разделам меню</div>}
                </div>

                {/* ТАБЫ */}
                {!search && (
                  <div className="tabs">
                    <button className={`tab${activeCat === null ? " on" : ""}`} onClick={() => setActiveCat(null)}>
                      Всё меню
                    </button>
                    {menuData.map((cat) => (
                      <button
                        key={cat.id}
                        className={`tab${activeCat === cat.id ? " on" : ""}`}
                        onClick={() => setActiveCat(activeCat === cat.id ? null : cat.id)}
                      >
                        {cat.title}
                      </button>
                    ))}
                  </div>
                )}

                {/* КОНТЕНТ */}
                <div className="content">
                  {search ? (
                    <>
                      <div className="rlabel">
                        {totalFound > 0 ? `Найдено: ${totalFound} позиций` : "Ничего не найдено"}
                      </div>
                      {totalFound === 0 ? (
                        <div className="empty">
                          По запросу «{search}» ничего не найдено
                          <div className="empty-sub">Попробуйте другое слово</div>
                        </div>
                      ) : (
                        searchResults.map((group, gi) => (
                          <div
                            key={gi}
                            className="sec rgroup"
                            style={{ marginBottom: 7, animationDelay: `${gi * 0.06}s` }}
                          >
                            <div className="rcat-head">{group.catTitle}</div>
                            {group.items.map((item, ii) => {
                              const key = `sr-${gi}-${ii}`;
                              return (
                                <div
                                  key={key}
                                  className={`item${openItem === key ? " open" : ""}`}
                                  onClick={() => item.desc && toggleItem(key)}
                                >
                                  <div className="irow">
                                    <span className="iname"><Highlighted text={item.name} query={search} /></span>
                                    <span className="idots" />
                                    <span className="iprice">{item.price} р.</span>
                                  </div>
                                  {item.desc && openItem === key && <div className="idesc">{item.desc}</div>}
                                </div>
                              );
                            })}
                          </div>
                        ))
                      )}
                    </>
                  ) : (
                    sections.map((cat, ci) => {
                      const isOpen = openSec === cat.id || activeCat === cat.id;
                      return (
                        <div
                          key={cat.id}
                          className="sec"
                          style={{ animationDelay: `${0.1 + ci * 0.045}s` }}
                        >
                          <div className="sec-head" onClick={() => toggleSec(cat.id)}>
                            <span className="sec-title">{cat.title}</span>
                            <div className="sec-right">
                              <span className="sec-count">{cat.items.length} позиций</span>
                              <svg className={`chevron${isOpen ? " open" : ""}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                <polyline points="6 9 12 15 18 9" />
                              </svg>
                            </div>
                          </div>
                          <div className={`itemlist${isOpen ? " open" : ""}`}>
                            {cat.items.map((item, ii) => {
                              const key = `${cat.id}-${ii}`;
                              return (
                                <div
                                  key={key}
                                  className={`item${openItem === key ? " open" : ""}`}
                                  onClick={() => item.desc && toggleItem(key)}
                                >
                                  <div className="irow">
                                    <span className="iname">{item.name}</span>
                                    <span className="idots" />
                                    <span className="iprice">{item.price} р.</span>
                                  </div>
                                  {item.desc && openItem === key && <div className="idesc">{item.desc}</div>}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>

                {/* ПОДВАЛ */}
                <div className="footer">
                  <div className="footer-rule" />
                  <div className="fnote">Банкеты и фуршеты по предварительному заказу</div>
                  <div className="fsite">MANILOVKAFE.RU</div>
                </div>

              </div>
            </>
          );
        }

        // ЗАПУСКАЕМ ПРИЛОЖЕНИЕ
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ManilovMenu />);
    </script>
</body>
</html>
